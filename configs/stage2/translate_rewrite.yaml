# Stage 2 — persona retrieval + rewrite pipeline defaults.

paths:
  persona_dir: data/persona_age_gender
  step3_output: data/stage2/stage2_rewrite.jsonl
  final_output: data/stage2/out.jsonl
  artifacts_dir: data/stage2/artifacts

personas:
  google_drive_url: https://drive.google.com/drive/folders/1SGrM4gG4kz155nJTqV7aFZgkSehhGXgF?usp=sharing
  local_dirname: persona_age_gender

model:
  step3:
    model: nvidia/nemotron-3-super-120b-a12b
    endpoint: https://integrate.api.nvidia.com/v1
  step4:
    model: nvidia/nemotron-3-super-120b-a12b
    endpoint: https://integrate.api.nvidia.com/v1

run:
  seed: 7
  mode: create

targets:
  platforms: [twitter, instagram, reddit, tiktok, thread]
  age_groups: [teen, 20s, 30s]
  gender_styles: [masc, fem, neutral]
